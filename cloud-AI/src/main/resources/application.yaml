spring:
  application:
    name: cloud-ai
  ai:
    ollama:
      base-url: http://localhost:11434
      chat:
        options:
          model: llama3
          temperature: 0.4
      embedding:
        options:
          model: all-minilm

  r2dbc:
    url: r2dbc:postgresql://localhost:5432/mydatabase?cloud-ai
    username: root
    password: 123456

server:
  port: 8788

logging:
  level:
    org.springframework.ai: DEBUG