spring:

# 开启懒加载
  cloud:
    openfeign:
      lazy-attributes-resolution: true

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:cloud}?currentSchema=web
    username: ${DB_USER:root}
    password: ${DB_PASS:123456}
    driver-class-name: org.postgresql.Driver
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      validation-query: SELECT 1
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
      pool-prepared-statements: true
      max-pool-prepared-statement-per-connection-size: 20
      filters: stat,wall,log4j
      use-global-data-source-stat: true
      connection-properties: druid.stat.mergeSql=true;druid.stat.slowSqlMillis=5000
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 10000
  security:
    oauth2:
      authorizationserver:
        issuer: http://localhost:9123 # 授权服务器的Issuer URI，与AuthorizationServerConfig中配置的保持一致
      resourceserver:
        jwt:
          issuer-uri: http://localhost:9123 # 资源服务器验证JWT的Issuer URI
          jwk-set-uri: http://localhost:9123/oauth2/jwks # 资源服务器获取公钥的地址
  rabbitmq:
    host: localhost
    port: 5672
    username: ${RABBITMQ_DEFAULT_USER}
    password: ${RABBITMQ_DEFAULT_PASS}
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB





mail:
  link:
    apply:
      # 邮箱审核友链回调地址（如果不开启）apply-notice 则无需在意该配置，随便填写即可
      redirect-uri: http://[后端地址:端口/域名]/link/email/apply
  # 是否开启文章邮箱评论提醒
  article-email-notice: false
  # 是否开启文章邮箱回复提醒
  article-reply-notice: false
  # 是否开启留言邮箱评论提醒
  message-email-notice: false
  # 是否开启新的留言提醒
  message-new-notice: false
  # 是否开启留言回复提醒
  message-reply-notice: false
  # 是否开启友链申请提醒（可以在邮箱中通过友链）
  apply-notice: false
  # 是否开启友链审核通知提醒对方
  pass-notice: false
# Feign 内部服务调用配置
cloud:
  internal:
    service-key: internal-service-key-2024

mybatis-plus:
  global-config:
    db-config:
      logic-delete-field: isDeleted
      logic-delete-value: "true"
      logic-not-delete-value: "false"





server:
  port: 8000
http_pool:
  max_total: 200
  default_max_per_route: 100
  connect_timeout: 5000
  connection_request_timeout: 1000
  socket_timeout: 65000
  validate_after_inactivity: 2000




